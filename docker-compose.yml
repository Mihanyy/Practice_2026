services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-app-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: BB_db
      POSTGRES_USER: BB_user
      POSTGRES_PASSWORD: BB_123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: